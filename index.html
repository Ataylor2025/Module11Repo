<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PokeLive Dashboard | Fetch API Demo</title>
    <meta
      name="description"
      content="A responsive web app that uses the Fetch API to retrieve and display live Pokemon data from PokeAPI with optional local caching."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Press+Start+2P&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="container">
        <p class="eyebrow">Fetch API + Dynamic DOM</p>
        <h1>PokeLive Dashboard</h1>
        <p class="intro">
          Explore live data from <strong>PokeAPI</strong>. Search by Pokémon name or load a random live set.
        </p>
      </div>
    </header>

    <main class="container">
      <section class="controls" aria-labelledby="controls-heading">
        <h2 id="controls-heading">Find Pokémon</h2>

        <form id="search-form" class="search-form">
          <label for="pokemon-input">Pokémon Name</label>
          <input id="pokemon-input" name="pokemon" type="text" placeholder="e.g., pikachu" required />
          <button type="submit">Search</button>
        </form>

        <div class="button-row">
          <button id="refresh-button" type="button">Load Random Set</button>
          <button id="clear-cache-button" type="button">Clear Cache</button>
        </div>

        <p id="status" class="status" aria-live="polite">Loading live data…</p>
      </section>

      <section aria-labelledby="featured-heading" class="featured-section">
        <h2 id="featured-heading">Featured Pokémon</h2>
        <article id="featured-card" class="featured-card" aria-live="polite">
          <p>Pick a Pokémon card to see details.</p>
        </article>
      </section>

      <section aria-labelledby="grid-heading" class="grid-section">
        <h2 id="grid-heading">Live Pokémon Feed</h2>
        <div id="pokemon-grid" class="pokemon-grid"></div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="container footer-content">
        <p>Data source: <a href="https://pokeapi.co/" target="_blank" rel="noreferrer noopener">PokeAPI</a></p>
        <p>&copy; 2026 PokeLive Dashboard</p>
      </div>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
